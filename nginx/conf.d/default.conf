upstream client_upstream {
    server client:3000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

upstream server_upstream {
    server server:8000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

# 1. HTTP Server - Redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name tarmeez.cloud www.tarmeez.cloud;

    # Allow ACME challenges (Certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all other traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. HTTPS Server - Main Production Proxy
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name tarmeez.cloud www.tarmeez.cloud;

    # SSL Certificates (managed by Certbot + fallback script)
    ssl_certificate /etc/letsencrypt/live/tarmeez.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tarmeez.cloud/privkey.pem;
    
    # SSL Hardening & Performance
    ssl_session_cache shared:LE_SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # API proxy -> backend server container
    location /api/ {
        proxy_pass http://server_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 10s;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    # Frontend proxy -> Next.js container
    location / {
        proxy_pass http://client_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 10s;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }
}
