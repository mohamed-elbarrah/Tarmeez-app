upstream client_upstream {
    server client:3000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

upstream server_upstream {
    server server:8000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

# HTTP-only server block for testing via server IP
server {
    listen 80;
    listen [::]:80;
    server_name _; # catch-all for testing via IP

    # Allow Certbot renewal path (kept for later if enabling SSL)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # API proxy -> backend server container
    location /api/ {
        proxy_pass http://server_upstream/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 10s;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    # Frontend proxy -> Next.js container
    location / {
        proxy_pass http://client_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 10s;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }
}

