services:
  # قاعدة البيانات الأساسية
  postgres_main:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: platform_db  # تم التغيير ليطابق ما يطلبه السيرفر
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d platform_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_main_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # قاعدة بيانات الإحصائيات (TimescaleDB)
  postgres_analytics:
    image: timescale/timescaledb:latest-pg15
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: analytics_db # تم التغيير ليطابق ما يطلبه السيرفر
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d analytics_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_analytics_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  # الواجهة الخلفية (Backend)
  server:
    build: ./server
    restart: always
    # يمنع تشغيل السيرفر إلا بعد جاهزية القواعد تماماً
    depends_on:
      postgres_main:
        condition: service_healthy
      postgres_analytics:
        condition: service_healthy
    env_file: ./server/.env
    environment:
      # نمرر الروابط هنا لتتخطى أي إعدادات Localhost قديمة
      DATABASE_URL: "postgresql://${DB_USER}:${DB_PASSWORD}@postgres_main:5432/platform_db"
      ANALYTICS_DATABASE_URL: "postgresql://${DB_USER}:${DB_PASSWORD}@postgres_analytics:5432/analytics_db"
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8000"] # يتأكد أن المنفذ 8000 مفتوح
      interval: 3s
      timeout: 3s
      retries: 10
    ports:
      - "8000:8000"

  # الواجهة الأمامية (Frontend)
  client:
    build: ./client
    restart: always
    # لن يبدأ إلا بعد نجاح السيرفر في تخطي الـ Healthcheck
    depends_on:
      server:
        condition: service_healthy
    command: /bin/sh -c "sleep 3 && node server.js" # تأخير إضافي لمدة 3 ثوانٍ كما طلبت
    env_file: ./client/.env
    ports:
      - "3000:3000"

volumes:
  postgres_main_data:
  postgres_analytics_data: